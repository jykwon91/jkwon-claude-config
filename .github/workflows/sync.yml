name: Sync agents, skills, and preferences to projects

on:
  push:
    branches:
      - main
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'projects.txt'
      - 'global-preferences.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jkwon-claude-config
        uses: actions/checkout@v4

      - name: Sync to registered projects
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git config --global user.name "claude-config-sync"
          git config --global user.email "claude-config-sync@users.noreply.github.com"

          PREFS=$(cat global-preferences.md)
          BEGIN_MARKER="<!-- BEGIN GLOBAL PREFERENCES -->"
          END_MARKER="<!-- END GLOBAL PREFERENCES -->"

          while IFS= read -r repo || [ -n "$repo" ]; do
            # Skip empty lines and comments
            [[ -z "$repo" || "$repo" == \#* ]] && continue

            echo "Syncing to $repo..."

            # Clone the target repo
            git clone "https://x-access-token:${SYNC_TOKEN}@github.com/${repo}.git" target-repo
            cd target-repo

            # Sync agents
            mkdir -p .claude/agents
            cp -r ../agents/. .claude/agents/

            # Sync skills
            mkdir -p .claude/skills
            cp -r ../skills/. .claude/skills/

            # Inject global preferences into CLAUDE.md
            if [ -f CLAUDE.md ]; then
              if grep -q "$BEGIN_MARKER" CLAUDE.md; then
                # Replace existing block
                awk -v begin="$BEGIN_MARKER" -v end="$END_MARKER" -v prefs="$PREFS" '
                  $0 == begin { print begin; print prefs; found=1; next }
                  $0 == end { if (found) { print end; found=0 } next }
                  found { next }
                  { print }
                ' CLAUDE.md > CLAUDE.md.tmp && mv CLAUDE.md.tmp CLAUDE.md
              else
                # Prepend block to existing CLAUDE.md
                echo -e "${BEGIN_MARKER}\n${PREFS}\n${END_MARKER}\n" | cat - CLAUDE.md > CLAUDE.md.tmp && mv CLAUDE.md.tmp CLAUDE.md
              fi
            else
              # Create CLAUDE.md with just the global preferences
              echo -e "${BEGIN_MARKER}\n${PREFS}\n${END_MARKER}" > CLAUDE.md
            fi

            # Commit and push if there are changes
            git add .claude/agents .claude/skills CLAUDE.md
            if git diff --cached --quiet; then
              echo "No changes for $repo, skipping."
            else
              git commit -m "chore: sync global agents, skills, and preferences from jkwon-claude-config"
              git push
              echo "Pushed to $repo."
            fi

            cd ..
            rm -rf target-repo

          done < projects.txt
